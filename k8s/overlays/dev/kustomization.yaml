apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml

namespace: api-dev

configMapGenerator:
  - name: api-server-config
    envs:
      - configmap.env

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/homeday/marriott
    newTag: latest

patches:
  - path: patch-deployment.yaml
  - path: patch-ingress.yaml
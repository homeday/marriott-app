apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  replicas: 2
  template:
    metadata:
      labels:
        environment: perf
    spec:
      containers:
        - name: api-server
          env:
            - name: APP_ENV
              value: perf
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi